<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薬事法・景品表示法 広告チェックツール</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f0efe9;
    --border: #e2e0d8; --border2: #ccc9bf;
    --text: #1a1917; --text2: #6b6860; --text3: #9e9b94;
    --accent: #1a6b4a; --accent-bg: #e8f4ee; --accent-border: #9fcfb8;
    --danger: #c0392b; --danger-bg: #fdf0ef; --danger-border: #f5c0bb;
    --warning: #a0680a; --warning-bg: #fdf5e6; --warning-border: #f5dba0;
    --alt-bg: #f0f4fd; --alt-border: #c5d3f0; --alt-text: #2c4a8a;
    --radius: 10px; --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  body { font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .page-wrapper { max-width: 780px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; flex-shrink: 0; }
  h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .subtitle { font-size: 13px; color: var(--text2); margin-left: 46px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .law-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .law-tab { padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .law-tab:hover { border-color: var(--border2); color: var(--text); }
  .law-tab.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); font-weight: 500; }

  .mode-tabs { display: flex; gap: 0; margin-bottom: 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .mode-tab { flex: 1; padding: 8px; background: transparent; border: none; font-size: 13px; color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; border-right: 1px solid var(--border); }
  .mode-tab:last-child { border-right: none; }
  .mode-tab.active { background: var(--accent); color: white; font-weight: 500; }

  .input-panel { display: none; }
  .input-panel.active { display: block; }

  textarea { width: 100%; min-height: 150px; border: none; outline: none; resize: vertical; font-size: 14px; color: var(--text); background: transparent; line-height: 1.75; font-family: inherit; }
  textarea::placeholder { color: var(--text3); }
  .url-input { width: 100%; border: none; outline: none; font-size: 14px; color: var(--text); background: transparent; font-family: inherit; padding: 4px 0; }
  .url-input::placeholder { color: var(--text3); }

  .upload-area { border: 2px dashed var(--border2); border-radius: var(--radius-sm); padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.15s; }
  .upload-area:hover { border-color: var(--accent); }
  .upload-area.has-file { border-color: var(--accent); background: var(--accent-bg); }
  .upload-label { font-size: 14px; color: var(--text2); }
  .upload-label span { color: var(--accent); font-weight: 500; }
  .upload-filename { font-size: 13px; color: var(--accent); margin-top: 6px; font-weight: 500; }

  .pdf-mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .pdf-mode-btn { flex: 1; padding: 7px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: transparent; font-size: 13px; color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .pdf-mode-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-border); font-weight: 500; }

  .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .input-hint { font-size: 12px; color: var(--text3); }
  .check-btn { padding: 9px 22px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .check-btn:hover { opacity: 0.88; }
  .check-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 2.5rem; color: var(--text2); font-size: 14px; }
  .loading.show { display: block; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; }
  .results.show { display: block; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  .summary-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 1rem; text-align: center; }
  .s-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-weight: 500; }
  .s-value { font-size: 28px; font-weight: 600; line-height: 1; }
  .s-value.danger { color: var(--danger); }
  .s-value.warning { color: var(--warning); }
  .s-value.ok { color: var(--accent); }
  .s-value.neutral { color: var(--text2); }

  .verdict-box { border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; border: 1px solid; }
  .verdict-box.ng { background: var(--danger-bg); border-color: var(--danger-border); }
  .verdict-box.caution { background: var(--warning-bg); border-color: var(--warning-border); }
  .verdict-box.ok { background: var(--accent-bg); border-color: var(--accent-border); }
  .verdict-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .verdict-box.ng .verdict-label { color: var(--danger); }
  .verdict-box.caution .verdict-label { color: var(--warning); }
  .verdict-box.ok .verdict-label { color: var(--accent); }
  .verdict-text { font-size: 14px; color: var(--text); line-height: 1.65; }

  .issues-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; }
  .issue-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 1.25rem; margin-bottom: 10px; border-left: 3px solid; box-shadow: var(--shadow); }
  .issue-card.ng { border-left-color: var(--danger); }
  .issue-card.caution { border-left-color: #e6a817; }
  .issue-card.info { border-left-color: #3a8bc0; }
  .issue-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-ng { background: var(--danger-bg); color: var(--danger); }
  .badge-caution { background: var(--warning-bg); color: var(--warning); }
  .badge-info { background: #eaf2f8; color: #1a5276; }
  .badge-law { font-size: 11px; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 10px; }
  .issue-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .issue-quote { font-size: 13px; color: var(--danger); background: var(--danger-bg); padding: 5px 10px; border-radius: var(--radius-sm); margin: 6px 0; word-break: break-all; }
  .issue-reason { font-size: 13px; color: var(--text2); line-height: 1.65; margin-bottom: 8px; }
  .issue-suggest { font-size: 13px; color: var(--text); line-height: 1.65; padding: 8px 10px; background: var(--accent-bg); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .issue-suggest strong { font-weight: 600; color: var(--accent); }

  .alternatives { background: var(--alt-bg); border: 1px solid var(--alt-border); border-radius: var(--radius-sm); padding: 10px 12px; }
  .alt-label { font-size: 11px; font-weight: 600; color: var(--alt-text); letter-spacing: 0.04em; margin-bottom: 8px; }
  .alt-note { font-size: 11px; color: var(--text3); margin-bottom: 8px; }
  .alt-item { font-size: 13px; color: var(--text); padding: 5px 8px; background: white; border-radius: var(--radius-sm); margin-bottom: 4px; border: 1px solid var(--alt-border); line-height: 1.5; }
  .alt-item:last-child { margin-bottom: 0; }

  .retry-btn { width: 100%; padding: 11px; background: transparent; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 14px; color: var(--text2); cursor: pointer; font-family: inherit; margin-top: 0.5rem; transition: background 0.15s; }
  .retry-btn:hover { background: var(--surface2); }
  .disclaimer { font-size: 12px; color: var(--text3); margin-top: 1.5rem; line-height: 1.7; padding: 12px 14px; background: var(--surface2); border-radius: var(--radius-sm); border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="page-wrapper">
  <header>
    <div class="logo-row">
      <div class="logo-icon">⚖</div>
      <h1>薬事法・景品表示法 広告チェックツール</h1>
    </div>
    <p class="subtitle">テキスト・URL・PDF・画像に対応。代替表現例・デザイン評価つき。</p>
  </header>

  <div class="card">
    <div class="section-label">チェック対象法令</div>
    <div class="law-tabs">
      <button class="law-tab active" data-law="全法令（薬機法・景品表示法・健康増進法・食品表示法）">全法令</button>
      <button class="law-tab" data-law="薬機法（医薬品医療機器等法）">薬機法</button>
      <button class="law-tab" data-law="景品表示法">景品表示法</button>
      <button class="law-tab" data-law="健康増進法">健康増進法</button>
      <button class="law-tab" data-law="食品表示法">食品表示法</button>
    </div>
  </div>

  <div class="card">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="text">テキスト</button>
      <button class="mode-tab" data-mode="url">URL</button>
      <button class="mode-tab" data-mode="pdf">PDF</button>
      <button class="mode-tab" data-mode="image">画像</button>
    </div>

    <!-- テキスト -->
    <div class="input-panel active" id="panel-text">
      <textarea id="adText" placeholder="広告文、パッケージ表記、SNS投稿文などを貼り付けてください。"></textarea>
      <div class="input-footer">
        <span class="input-hint" id="charCount">0文字</span>
        <button class="check-btn" onclick="runCheck('text')">チェック実行</button>
      </div>
    </div>

    <!-- URL -->
    <div class="input-panel" id="panel-url">
      <input class="url-input" id="urlInput" type="url" placeholder="https://example.com/product" />
      <div class="input-footer">
        <span class="input-hint">ページのテキストを自動取得します</span>
        <button class="check-btn" onclick="runCheck('url')">チェック実行</button>
      </div>
    </div>

    <!-- PDF -->
    <div class="input-panel" id="panel-pdf">
      <div class="pdf-mode-row">
        <button class="pdf-mode-btn active" data-pdfmode="text">テキスト内容をチェック</button>
        <button class="pdf-mode-btn" data-pdfmode="design">デザイン・レイアウトも評価</button>
      </div>
      <div class="upload-area" id="pdfArea" onclick="document.getElementById('pdfInput').click()">
        <div class="upload-label">クリックまたはドラッグ＆ドロップで<span>PDFを選択</span></div>
        <div class="upload-filename" id="pdfFilename"></div>
      </div>
      <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="onFileSelect(this,'pdfArea','pdfFilename')">
      <div class="input-footer">
        <span class="input-hint">最大10MB</span>
        <button class="check-btn" onclick="runCheck('pdf')">チェック実行</button>
      </div>
    </div>

    <!-- 画像 -->
    <div class="input-panel" id="panel-image">
      <div class="upload-area" id="imageArea" onclick="document.getElementById('imageInput').click()">
        <div class="upload-label">クリックまたはドラッグ＆ドロップで<span>画像を選択</span></div>
        <div class="upload-label" style="font-size:12px;color:var(--text3);margin-top:4px;">JPG・PNG・WebP対応</div>
        <div class="upload-filename" id="imageFilename"></div>
      </div>
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="onFileSelect(this,'imageArea','imageFilename')">
      <div class="input-footer">
        <span class="input-hint">パッケージ・広告バナー・LP画像などに対応</span>
        <button class="check-btn" onclick="runCheck('image')">チェック実行</button>
      </div>
    </div>
  </div>

  <div class="loading" id="loading">
    <span class="spinner"></span>AIが法的リスクを分析中...
  </div>

  <div class="results" id="results"></div>

  <p class="disclaimer">
    ※ このツールはAIによる参考情報の提供を目的としています。代替表現例も参考案であり、法的安全性を保証するものではありません。最終的な判断は薬事コンサルタント・弁護士等の専門家にご確認ください。
  </p>
</div>

<script>
let activeLaw = '全法令（薬機法・景品表示法・健康増進法・食品表示法）';
let activeMode = 'text';
let activePdfMode = 'text';

document.querySelectorAll('.law-tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.law-tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); activeLaw = t.dataset.law;
}));

document.querySelectorAll('.mode-tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.mode-tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.input-panel').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); activeMode = t.dataset.mode;
  document.getElementById('panel-' + activeMode).classList.add('active');
}));

document.querySelectorAll('.pdf-mode-btn').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.pdf-mode-btn').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); activePdfMode = t.dataset.pdfmode;
}));

document.getElementById('adText').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length + '文字';
});

function onFileSelect(input, areaId, nameId) {
  const file = input.files[0];
  if (file) {
    document.getElementById(nameId).textContent = file.name;
    document.getElementById(areaId).classList.add('has-file');
  }
}

['pdfArea','imageArea'].forEach(id => {
  const area = document.getElementById(id);
  area.addEventListener('dragover', e => { e.preventDefault(); area.style.borderColor='var(--accent)'; });
  area.addEventListener('dragleave', () => { area.style.borderColor=''; });
  area.addEventListener('drop', e => {
    e.preventDefault();
    const inputId = id === 'pdfArea' ? 'pdfInput' : 'imageInput';
    const nameId = id === 'pdfArea' ? 'pdfFilename' : 'imageFilename';
    const input = document.getElementById(inputId);
    input.files = e.dataTransfer.files;
    onFileSelect(input, id, nameId);
  });
});

async function runCheck(mode) {
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');
  loading.classList.add('show');
  results.classList.remove('show');
  results.innerHTML = '';

  try {
    let data, res;
    if (mode === 'text') {
      const text = document.getElementById('adText').value.trim();
      if (!text) { alert('広告文を入力してください。'); loading.classList.remove('show'); return; }
      res = await fetch('/api/check', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ adText: text, lawScope: activeLaw }) });
      data = await res.json();
    } else if (mode === 'url') {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) { alert('URLを入力してください。'); loading.classList.remove('show'); return; }
      res = await fetch('/api/check-url', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ url, lawScope: activeLaw }) });
      data = await res.json();
    } else if (mode === 'pdf') {
      const file = document.getElementById('pdfInput').files[0];
      if (!file) { alert('PDFファイルを選択してください。'); loading.classList.remove('show'); return; }
      const form = new FormData();
      form.append('pdf', file); form.append('lawScope', activeLaw); form.append('mode', activePdfMode);
      res = await fetch('/api/check-pdf', { method: 'POST', body: form });
      data = await res.json();
    } else if (mode === 'image') {
      const file = document.getElementById('imageInput').files[0];
      if (!file) { alert('画像ファイルを選択してください。'); loading.classList.remove('show'); return; }
      const form = new FormData();
      form.append('image', file); form.append('lawScope', activeLaw);
      res = await fetch('/api/check-image', { method: 'POST', body: form });
      data = await res.json();
    }
    if (!res.ok) throw new Error(data.error);
    renderResults(data);
  } catch (e) {
    results.innerHTML = `<div class="verdict-box ng"><div class="verdict-label">エラー</div><div class="verdict-text">${e.message || 'もう一度お試しください。'}</div></div>`;
    results.classList.add('show');
  }
  loading.classList.remove('show');
}

function renderResults(data) {
  const results = document.getElementById('results');
  const vc = data.verdict === 'NG' ? 'ng' : data.verdict === 'CAUTION' ? 'caution' : 'ok';
  const vl = data.verdict === 'NG' ? '要修正 — 違反リスクあり' : data.verdict === 'CAUTION' ? '要注意 — グレーゾーン' : '問題なし';
  const infoCount = (data.issues || []).filter(i => i.level === 'INFO').length;

  let html = `
    <div class="summary-grid">
      <div class="summary-card"><div class="s-label">NG項目</div><div class="s-value ${data.ngCount > 0 ? 'danger' : 'ok'}">${data.ngCount}</div></div>
      <div class="summary-card"><div class="s-label">要注意項目</div><div class="s-value ${data.cautionCount > 0 ? 'warning' : 'ok'}">${data.cautionCount}</div></div>
      <div class="summary-card"><div class="s-label">推奨事項</div><div class="s-value neutral">${infoCount}</div></div>
    </div>
    <div class="verdict-box ${vc}"><div class="verdict-label">${vl}</div><div class="verdict-text">${data.verdictReason}</div></div>`;

  if (data.issues && data.issues.length > 0) {
    html += `<div class="issues-title">指摘事項（${data.issues.length}件）</div>`;
    for (const issue of data.issues) {
      const lvl = issue.level === 'NG' ? 'ng' : issue.level === 'CAUTION' ? 'caution' : 'info';
      const alts = issue.alternatives && issue.alternatives.length > 0
        ? `<div class="alternatives">
            <div class="alt-label">代替表現例（参考案）</div>
            <div class="alt-note">※ 法的安全性を保証するものではありません。専門家にご確認ください。</div>
            ${issue.alternatives.map(a => `<div class="alt-item">「${a}」</div>`).join('')}
           </div>` : '';
      html += `<div class="issue-card ${lvl}">
        <div class="issue-header"><span class="badge badge-${lvl}">${issue.level}</span><span class="badge-law">${issue.law}</span></div>
        <div class="issue-title">${issue.title}</div>
        ${issue.quote ? `<div class="issue-quote">「${issue.quote}」</div>` : ''}
        <div class="issue-reason">${issue.reason}</div>
        <div class="issue-suggest"><strong>対応案：</strong>${issue.suggestion}</div>
        ${alts}
      </div>`;
    }
  }

  if (data.overallComment) {
    html += `<div class="verdict-box ${vc}" style="margin-top:0.75rem;"><div class="verdict-label">総評</div><div class="verdict-text">${data.overallComment}</div></div>`;
  }

  html += `<button class="retry-btn" onclick="location.reload()">別のコンテンツをチェックする</button>`;
  results.innerHTML = html;
  results.classList.add('show');
}
</script>
</body>
</html>
